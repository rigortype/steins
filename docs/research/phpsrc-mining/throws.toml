# throws.toml — builtin throw facts mined from php-src C (ADR-0040 source #2)
# php-src commit: 6bc7c26cf67a9480b5ef9d6191aebe87fa931183 (Thu Jul 9 2026)
#
# Each [[throw]] row: the builtin, the exception class it can raise, the
# condition, and whether the condition is input-determined (argument-value,
# statically refutable with proven args) or environmental (external state).
# Evidence is the C throw site file:line.
#
# CONVENTION for Steins: `zend_argument_value_error(...)` -> ValueError;
# `zend_argument_type_error`/parameter coercion -> TypeError;
# `zend_throw_error(zend_ce_division_by_zero_error, ...)` -> DivisionByZeroError;
# etc. All engine exceptions are global (no namespace); random's are namespaced
# (Random\RandomException, Random\BrokenRandomEngineError).
#
# gap_vs_steins = true marks a throw fact NOT in the current
# steins-catalog builtin_throws (which today lists only intdiv->DivisionByZeroError
# and two json placeholder keys).

# ─────────────────────── arithmetic ───────────────────────
[[throw]]
function = "intdiv"
throws = "DivisionByZeroError"
determinism = "input"
condition = "divisor == 0"
evidence = "ext/standard/math.c:1502"
gap_vs_steins = false
note = "Already catalogued in steins builtin_throws."

[[throw]]
function = "intdiv"
throws = "ArithmeticError"
determinism = "input"
condition = "divisor == -1 && dividend == PHP_INT_MIN (overflow)"
evidence = "ext/standard/math.c:1507"
gap_vs_steins = true
note = "MISSING from steins builtin_throws('intdiv'), which lists only DivisionByZeroError. Both arms are input-determined; a complete throw set is [DivisionByZeroError, ArithmeticError]. Note DivisionByZeroError extends ArithmeticError, so a coarse @throws ArithmeticError subsumes both."

# ─────────────────────── JSON ───────────────────────
[[throw]]
function = "json_decode"
throws = "JsonException"
determinism = "input"
condition = "malformed JSON AND options & JSON_THROW_ON_ERROR"
evidence = "ext/json/json.c:303-308 (throw path when THROW_ON_ERROR set)"
gap_vs_steins = "flag-gated"
note = "Steins keys this under the placeholder 'json_decode_throwing' pending flag inspection. Throw is conditional on the JSON_THROW_ON_ERROR bit in $flags (arg 4). Without flag inference the FP-safe choice is to NOT manufacture the throw (widen) — matches current steins posture."

[[throw]]
function = "json_encode"
throws = "JsonException"
determinism = "input"
condition = "unencodable value AND options & JSON_THROW_ON_ERROR"
evidence = "ext/json/json.c:271"
gap_vs_steins = "flag-gated"
note = "Mirror of json_decode. Steins placeholder 'json_encode_throwing'."

# ─────────────────────── DateTime (constructor throws; procedural returns false) ───────────────────────
[[throw]]
function = "DateTime::__construct"
throws = "DateMalformedStringException"
determinism = "input"
condition = "unparseable $datetime string"
evidence = "ext/date/php_date.c:2644 (PHP_DATE_INIT_CTOR path) + class reg at :1817"
gap_vs_steins = true
note = "PHP-8 migration: the OO constructor THROWS where date_create() returns false. DateMalformedStringException extends DateException extends Exception (see hierarchy.toml). DateTimeImmutable::__construct likewise. NOT in steins builtin_throws, and DateException/DateMalformedStringException are NOT yet in steins' exception tree."

[[throw]]
function = "DateTimeZone::__construct"
throws = "DateInvalidTimeZoneException"
determinism = "input"
condition = "unknown timezone identifier"
evidence = "ext/date/php_date.c (DateInvalidTimeZoneException reg at php_date.stub.php:782)"
confidence = "stub+partial-C"
gap_vs_steins = true
note = "Whole Date* exception family (DateError/DateObjectError/DateRangeError/DateException + Malformed*/Invalid* leaves) is absent from steins' exception tree — see hierarchy.toml rows and effects_gaps."

