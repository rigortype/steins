# failure_arms.toml — false/null failure-arm classification (ADR-0042)
# php-src commit: 6bc7c26cf67a9480b5ef9d6191aebe87fa931183 (Thu Jul 9 2026)
# C evidence read at that pin; runtime notes vs PHP 8.5.8 (cli).
#
# CAUSE vocabulary (ADR-0042 + the failure.* dot-path registry):
#   failure.resource     — allocation/handle exhaustion only (irrefutable, unrecoverable)
#   failure.environment  — filesystem/network/external state (normal operational failure; must-check)
#   failure.input        — argument-value-determined; statically refutable with proven args
# A function may carry MULTIPLE arms (list each with file:line evidence).
#
# PHP-8 migration note: many historical false-returns for BAD ARGUMENT VALUES
# became ValueError/TypeError throws. Those arms are recorded here as
# `migrated_to_throw = true` and cross-listed in throws.toml — they are NOT
# false arms in PHP 8.5. A `|false` in the stub that is only reachable via a
# now-throwing path is flagged `false_arm_unreachable`.
#
# NOT-A-FAILURE SENTINELS: some `|false` returns are legitimate results, not
# failures (array_search "not found", strpos "no match", next()/current() past
# end). These MUST NOT receive a failure.* label. Collected at the bottom under
# [[sentinel]].

# ─────────────────────────── cURL ───────────────────────────
[[function]]
name = "curl_init"
return_type = "CurlHandle|false"
confidence = "verified-C"
arms = [
  { cause = "failure.resource", evidence = "ext/curl/interface.c:1142", detail = "curl_easy_init() returned NULL — libcurl handle allocation failed" },
  { cause = "failure.input", evidence = "ext/curl/interface.c:1158", detail = "optional $url argument rejected by php_curl_option_url (interface.c:83) — value-determined" },
]
note = "ADR-0042's canonical failure.resource example. The url arm is input; with a proven-good url literal it is disproven per site."

[[function]]
name = "curl_exec"
return_type = "string|bool"
confidence = "verified-C"
arms = [
  { cause = "failure.environment", evidence = "ext/curl/interface.c:2349", detail = "curl_easy_perform() != CURLE_OK — network/transfer failure" },
]
note = "Returns true (not string) when CURLOPT_RETURNTRANSFER is off; string when on; false on transfer error. The false arm is purely environmental."

[[function]]
name = "curl_setopt"
return_type = "bool"
confidence = "verified-C"
arms = [
  { cause = "failure.input", evidence = "ext/curl/interface.c:2277", detail = "_php_curl_setopt() != SUCCESS — invalid option id or value" },
]
note = "Some options additionally raise ValueError/TypeError inside _php_curl_setopt (see throws.toml). The plain false arm is invalid-value → input."

