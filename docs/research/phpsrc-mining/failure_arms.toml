# ─────────────────────── JSON ───────────────────────
[[function]]
name = "json_decode"
return_type = "mixed"
confidence = "verified-C"
arms = [
  { cause = "failure.input", evidence = "ext/json/json.c:312", detail = "parse error without JSON_THROW_ON_ERROR → RETURN_NULL (malformed JSON)" },
]
migrated_to_throw = "conditional"
note = "null is ambiguous — valid decode of the literal `null` also yields null. With JSON_THROW_ON_ERROR the arm becomes JsonException (json.c throw path). $depth<=0 / >INT_MAX are ValueError (json.c:316/321)."

[[function]]
name = "json_encode"
return_type = "string|false"
confidence = "verified-C"
arms = [
  { cause = "failure.input", evidence = "ext/json/json.c:266", detail = "encoder.error_code != NONE and not PARTIAL_OUTPUT_ON_ERROR → false (unencodable value: bad UTF-8, NAN/INF, recursion, depth)" },
]
migrated_to_throw = "conditional"
note = "With JSON_THROW_ON_ERROR → JsonException (json.c:271). ADR-0042 point 1: input-determined, disproven with a proven-encodable argument."

