# ─────────────────────── NOT-A-FAILURE SENTINELS (do NOT label failure.*) ───────────────────────
[[sentinel]]
name = "array_search"
return_type = "int|string|false"
detail = "false means 'needle not found' — a legitimate result, not a failure. Labeling it failure.* would be wrong."
confidence = "stub+semantics"

[[sentinel]]
name = "strpos"
return_type = "int|false"
detail = "false means 'substring not present'. Classic '=== false' idiom; not a failure."
confidence = "stub+semantics"

[[sentinel]]
name = "array_key_first"
return_type = "int|string|null"
detail = "null means 'array is empty' — a legitimate result, not a failure."
confidence = "stub+semantics"

[[sentinel]]
name = "next"
return_type = "mixed"
detail = "false when the internal pointer moves past the end — iteration terminator, not failure. (current/end/prev/reset likewise.)"
confidence = "stub+semantics"
