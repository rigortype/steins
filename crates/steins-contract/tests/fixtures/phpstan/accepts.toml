# Coincidental agreement: a mixed real/missing union is Maybe in PHPStan too,
# and Steins already answers Maybe for any class-string probe — so this ports
# cleanly even though the *reason* differs (PHPStan: partial class table;
# Steins: non-extensional). Kept as PORTED (asserts PHPStan's own Maybe).
[[row]]
name = "classstring_accepts_union_mixed"
lhs = "class-string"
rhs = "'stdClass'|'Nonexistent'"
phpstan = "maybe"
source = "ClassStringTypeTest::dataAccepts (union real|missing → Maybe)"

# ── NEEDS-DECISION (quarantine): `accepts` vs `isSuperTypeOf` seam ──────────
# PHPStan's `accepts` and `isSuperTypeOf` DISAGREE on this row:
#   ConstantIntegerType(1)->accepts(IntegerType)      = No
#   ConstantIntegerType(1)->isSuperTypeOf(IntegerType) = Maybe   (see is_super_type_of.toml)
# Steins has ONE relation. `admits_fact(LitInt(1), General{int})` answers
# Maybe — the overlap judgment (some ints are 1, some are not), which matches
# PHPStan's isSuperTypeOf exactly and is the documented contract of admits_fact
# (Yes=subset, No=disjoint, Maybe=partial). So Steins cannot also produce the
# `accepts`-specific No here without contradicting the isSuperTypeOf row it
# already matches. This is the accepts/isSuperTypeOf asymmetry, NOT a bug in
# a leaf rule. Whether Steins' declared-contract acceptance should grow a
# distinct PHPStan-`accepts` strictness for narrow LHS (ADR-0030 registry #1,
# "two acceptance relations, not one") is a design decision for the
# orchestrator — quarantined, not reclassified.
[[row]]
name = "const1_accepts_general_int"
lhs = "1"
rhs = "int"
phpstan = "no"
steins = "maybe"
status = "divergent"
adr = "ADR-0030 registry 4"
note = "PHPStan's accepts=No is worst-case reasoning on a declared wide type flowing into a narrow contract; the runtime value may comply, so the proof layer answers the overlap Maybe (== PHPStan isSuperTypeOf). The accepts/isSuperTypeOf asymmetry deliberately collapses to the single overlap relation."
source = "ConstantIntegerTypeTest::dataAccepts[1]"
