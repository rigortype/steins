# ── EXPECTED-DIVERGENT: class-string is non-extensional (ADR-0038) ──────────
# PHPStan decides these by consulting the class table (does the string name a
# real class?). Steins lowers class-string to StrOpaque: any string is Maybe,
# a non-string is No — it can never answer Yes/No on a concrete class name.
# ADR-0030 imports the denotational core "as-is" but registers this: provenance-
# flavored string types are non-extensional and cannot decide membership.
[[row]]
name = "classstring_accepts_real_class"
lhs = "class-string"
rhs = "'stdClass'"
phpstan = "yes"
steins = "maybe"
status = "divergent"
adr = "ADR-0038 (non-extensional string types) / ADR-0030 denotational-core registry"
source = "ClassStringTypeTest::dataAccepts (ConstantString stdClass → Yes)"

[[row]]
name = "classstring_accepts_missing_class"
lhs = "class-string"
rhs = "'NonexistentClass'"
phpstan = "no"
steins = "maybe"
status = "divergent"
adr = "ADR-0038 (non-extensional string types) / ADR-0030 denotational-core registry"
source = "ClassStringTypeTest::dataAccepts (ConstantString NonexistentClass → No)"

[[row]]
name = "classstring_accepts_union_all_real"
lhs = "class-string"
rhs = "'Foo'|'Bar'"
phpstan = "yes"
steins = "maybe"
status = "divergent"
adr = "ADR-0038 (non-extensional string types) / ADR-0030 denotational-core registry"
source = "ClassStringTypeTest::dataAccepts (union of real ConstantStrings → Yes)"

[[row]]
