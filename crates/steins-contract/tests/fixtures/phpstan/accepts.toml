# PHPStan `accepts` data providers, ported as Steins acceptance fixtures.
# ADR-0030: "Compatibility on this core is fixed mechanically by porting
# phpstan-src's data-provider tests as fixtures."
#
# ─────────────────────────────────────────────────────────────────────────
# Attribution. Rows are derived from phpstan-src, which is MIT-licensed.
#   Source:  https://github.com/phpstan/phpstan-src
#   Commit:  cdc6ca267a2de883adc54393e277e905560b0a6b
#   License: MIT (Copyright (c) Ondřej Mirtes and contributors)
# Only the (type, type, judgment) triples and their provenance are reproduced;
# no phpstan-src source is vendored into this repository.
# ─────────────────────────────────────────────────────────────────────────
#
# Operation. PHPStan `Type::accepts($other, true)->result`. Steins runs its
# single acceptance relation (`admits_val` / `admits_fact`) over the probe of
# the right-hand type. See tests/phpstan_port.rs for the bridge.
#
# Coverage summary for the providers mined into this file
# (IntegerTypeTest, FloatTypeTest, BooleanTypeTest, ConstantIntegerTypeTest,
#  ClassStringTypeTest — the `dataAccepts` providers):
#
#   PORTED          18   Steins agrees with PHPStan (scalar/literal/nullable/union).
#   EXPECTED-DIVERGENT 5  4× class-string is non-extensional (ADR-0038) → Steins
#                         answers Maybe where PHPStan reflects a class table;
#                         1× narrow-LHS accepts strictness deliberately not
#                         reproduced (ADR-0030 registry 4): the accepts/
#                         isSuperTypeOf asymmetry collapses to the single
#                         overlap relation.
#
# OUT-OF-SURFACE (not expressible on today's surface; counted, not ported):
#   IntegerTypeTest::dataAccepts        1   `int accepts mixed`  (mixed RHS)
#   FloatTypeTest::dataAccepts          2   `mixed` RHS; `string|resource` (resource)
#   BooleanTypeTest::dataAccepts        1   `bool accepts mixed`
#   ClassStringTypeTest::dataAccepts    1   `class-string accepts class-string`
#                                           (non-extensional RHS, StrOpaque)
#   StringTypeTest::dataAccepts        19   templates, template-args,
#                                           object&HasProperty intersection,
#                                           class-string RHS, and the
#                                           decimal-integer-string accessory
#                                           predicate (unmodeled) — whole provider
#   ── object world / generics / accessory predicates / subtraction types are
#      the known unimplemented queue (ADR-0030, ADR-0032).

[meta]
operation = "accepts"
source_repo = "https://github.com/phpstan/phpstan-src"
source_commit = "cdc6ca267a2de883adc54393e277e905560b0a6b"
source_license = "MIT"

