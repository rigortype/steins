# PHPStan `isSuperTypeOf` data providers, ported as Steins acceptance fixtures.
# ADR-0030 denotational core: acceptance is set inclusion, judgments trinary.
#
# ─────────────────────────────────────────────────────────────────────────
# Attribution. Rows are derived from phpstan-src (MIT-licensed).
#   Source:  https://github.com/phpstan/phpstan-src
#   Commit:  cdc6ca267a2de883adc54393e277e905560b0a6b
#   License: MIT (Copyright (c) Ondřej Mirtes and contributors)
# No phpstan-src source is vendored; only (type, type, judgment) triples.
# ─────────────────────────────────────────────────────────────────────────
#
# Operation. PHPStan `Type::isSuperTypeOf($other)`. This is the relation
# Steins' `admits_fact` implements natively: Yes ⇒ subset, No ⇒ disjoint,
# Maybe ⇒ partial overlap. The union-on-the-subtype-side combinator
# (mixed ⇒ Maybe) is Steins' `Certainty::all_of`.
#
# Coverage summary for the providers mined into this file
# (IntegerTypeTest, BooleanTypeTest, MixedTypeTest, ConstantIntegerTypeTest,
#  ConstantStringTypeTest, ClassStringTypeTest — the `dataIsSuperTypeOf`
#  providers):
#
#   PORTED             16
#   EXPECTED-DIVERGENT  2   class-string non-extensional (ADR-0038)
#   NEEDS-DECISION      0
#
# OUT-OF-SURFACE (counted, not ported):
#   IntegerTypeTest::dataIsSuperTypeOf      1   `int ⊇ mixed` (mixed RHS)
#   BooleanTypeTest::dataIsSuperTypeOf      1   `bool ⊇ mixed`
#   MixedTypeTest::dataIsSuperTypeOf       24   subtraction-typed `mixed`
#                                              (rows 2-10,12-21,23,25), object
#                                              world (object, never), strict-mixed,
#                                              and `mixed ⊇ mixed` — subtraction
#                                              types are the deferred queue (ADR-0030)
#   ConstantStringTypeTest::dataIsSuperTypeOf 14 generic-class-string / template /
#                                              static (object world & generics)
#   StringTypeTest::dataIsSuperTypeOf       8   generic-class-string, templates,
#                                              StringAlwaysAcceptingObjectWithToString
#   ClassStringTypeTest::dataIsSuperTypeOf  2   generic-class-string RHS (object world)

[meta]
operation = "isSuperTypeOf"
source_repo = "https://github.com/phpstan/phpstan-src"
source_commit = "cdc6ca267a2de883adc54393e277e905560b0a6b"
source_license = "MIT"

# ── IntegerType::dataIsSuperTypeOf ──────────────────────────────────────────
[[row]]
name = "int_super_int"
lhs = "int"
rhs = "int"
phpstan = "yes"
source = "IntegerTypeTest::dataIsSuperTypeOf[0]"

[[row]]
name = "int_super_const1"
lhs = "int"
rhs = "1"
phpstan = "yes"
source = "IntegerTypeTest::dataIsSuperTypeOf[1]"

# int ⊇ (int|string): int fully covers the int arm, is disjoint from string —
# all_of(Yes, No) = Maybe. This is exactly why PHPStan's union-subtype
# combinator yields Maybe, not No.
[[row]]
name = "int_super_int_or_string"
lhs = "int"
rhs = "int|string"
phpstan = "maybe"
source = "IntegerTypeTest::dataIsSuperTypeOf[3]"

[[row]]
name = "int_super_string"
lhs = "int"
rhs = "string"
phpstan = "no"
source = "IntegerTypeTest::dataIsSuperTypeOf[4]"

